name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"
  SOLUTION_FILE: "EmployeeManagement.slnx"
  API_PROJECT: "src/EmployeeManagement.API/EmployeeManagement.API.csproj"
  WEB_PROJECT: "src/EmployeeManagement.Web/EmployeeManagement.Web.csproj"

jobs:
  build-test-publish:
    name: Restore, Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Run unit tests with code coverage
        run: >
          dotnet test ${{ env.SOLUTION_FILE }} --configuration Release --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings tests/EmployeeManagement.Tests/coverlet.runsettings
          --results-directory ./test-results

      - name: Generate code coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.4
          reportgenerator "-reports:test-results/**/coverage.cobertura.xml" "-targetdir:test-results/coverage-report" "-reporttypes:Html;TextSummary"
          { echo "### Code Coverage Summary"; echo '```'; cat test-results/coverage-report/Summary.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results and coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --no-build --output ./publish/api

      - name: Publish MVC Web
        run: dotnet publish ${{ env.WEB_PROJECT }} --configuration Release --no-build --output ./publish/web

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: employeemanagement-api
          path: ./publish/api

      - name: Upload MVC Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: employeemanagement-web
          path: ./publish/web

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-test-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: false
          tags: employeemanagement-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build MVC Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: false
          tags: employeemanagement-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
