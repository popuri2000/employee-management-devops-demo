name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"
  SOLUTION_FILE: "EmployeeManagement.slnx"
  API_PROJECT: "src/EmployeeManagement.API/EmployeeManagement.API.csproj"
  WEB_PROJECT: "src/EmployeeManagement.Web/EmployeeManagement.Web.csproj"

jobs:
  build-test-publish:
    name: Restore, Build, Test & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Run unit tests with code coverage
        run: >
          dotnet test ${{ env.SOLUTION_FILE }} --configuration Release --no-build --verbosity normal
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --settings tests/EmployeeManagement.Tests/coverlet.runsettings
          --results-directory ./test-results

      - name: Generate code coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.4.4
          reportgenerator "-reports:test-results/**/coverage.cobertura.xml" "-targetdir:test-results/coverage-report" "-reporttypes:Html;TextSummary"
          { echo "### Code Coverage Summary"; echo '```'; cat test-results/coverage-report/Summary.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results and coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./test-results

      - name: Publish API
        run: dotnet publish ${{ env.API_PROJECT }} --configuration Release --no-build --output ./publish/api

      - name: Publish MVC Web
        run: dotnet publish ${{ env.WEB_PROJECT }} --configuration Release --no-build --output ./publish/web

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: employeemanagement-api
          path: ./publish/api

      - name: Upload MVC Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: employeemanagement-web
          path: ./publish/web

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-test-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MVC Web Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:latest
            ghcr.io/${{ github.repository }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: build-test-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start full stack (SQL Server + API + Web)
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Show running containers
        if: always()
        run: docker compose ps

      - name: Verify API health endpoint
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/health; then exit 0; fi
            sleep 3
          done
          echo "API health check never succeeded" && exit 1

      - name: Verify API returns seeded employee data
        run: |
          response=$(curl -sf "http://localhost:8080/api/v1/employees?pageNumber=1&pageSize=5")
          echo "$response"
          echo "$response" | grep -q '"totalCount"' || (echo "API did not return expected employee payload" && exit 1)

      - name: Verify MVC Web app is reachable and reaches the API
        run: |
          # Web -> API is a server-to-server call; hitting the login page proves the
          # Web container is up and can render, independent of the API being healthy.
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/Account/Login)
          echo "Web /Account/Login status: $status"
          [ "$status" = "200" ] || (echo "Web app did not respond as expected" && exit 1)

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down the stack
        if: always()
        run: docker compose down -v
