services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: employeemanagement-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - employeemanagement-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: employeemanagement-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=EmployeeManagementDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;MultipleActiveResultSets=true"
      DemoLogin__Username: "admin"
      DemoLogin__Password: "Admin@123"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - employeemanagement-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: employeemanagement-web
    environment:
      ASPNETCORE_ENVIRONMENT: "Docker"
      ApiSettings__BaseUrl: "http://api:8080/"
    ports:
      - "8081:8080"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - employeemanagement-network

networks:
  employeemanagement-network:
    driver: bridge

volumes:
  sqlserver-data:
